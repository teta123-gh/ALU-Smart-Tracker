services:
  - type: web
    name: alu-smart-tracker-api
    runtime: python
    buildCommand: "pip install -r backend/requirements.txt"
    startCommand: "gunicorn backend.app:app"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10

  - type: static
    name: alu-smart-tracker-frontend
    buildCommand: ""
    staticPublishPath: frontend
